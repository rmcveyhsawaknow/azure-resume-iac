name: Production Full Stack Cloudflare

on:
  push:
    branches:
    - main
    paths:
    - '.github/workflows/prod-full-stack-cloudflare.yml'
    - '.iac/**'
    - 'backend/**'
    - 'frontend/**'
  workflow_dispatch:

permissions:
  contents: read

env: 
  dnsZone: 'ryanmcvey.me'
  stackVersion: 'v1'
  stackEnvironment: 'prod'
  stackLocation: 'eastus'
  stackLocationCode: 'cus1'
  AppName: 'resume'
  AppBackendName: 'resumectr'
  tagCostCenter: 'azCF'
  rgDns: 'glbl-ryanmcveyme-v1-rg'
  # Custom domain prefix — used for CORS origin, Cloudflare DNS CNAME, and storage custom domain.
  # Prod uses just the AppName; dev appends environment+version.
  customDomainPrefix: 'resume'

jobs:

# JOB to run change detection
  changes:
    runs-on: ubuntu-latest
    # Set job outputs to values from filter step
    outputs:
      iac: ${{ steps.filter.outputs.iac }}
      backendApp: ${{ steps.filter.outputs.backendApp }}
      frontendSite: ${{ steps.filter.outputs.frontendSite }}
    steps:
    - uses: actions/checkout@v5
    # Checkout is required because dorny/paths-filter needs the repository contents (this workflow runs on push events).
    - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
      id: filter
      with:
        filters: |
          iac:
            - '.iac/**'
          backendApp:
            - 'backend/**'
          frontendSite:
            - 'frontend/**'

  deployProductionIac:
    needs: changes
    if: ${{ needs.changes.outputs.iac == 'true' || github.event_name == 'workflow_dispatch' }}
    name: Deploy IaC to production
    environment:
      name: production
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - name: Azure Login
      uses: Azure/login@v2
      with:
        creds: ${{ secrets.AZURE_RESUME_GITHUB_SP }}   
    
    - name: Get and Set Subscription Variable
      id: subs
      run: |
        SUBID=$(az account show --query id --output tsv)
        echo "subid=${SUBID}" >> $GITHUB_OUTPUT
    - name: Echo SubscriptionId
      run: echo "${{ steps.subs.outputs.subid }}"      
    
    - name: Echo Github.run_id
      id: runId
      run: |
        echo "${{ github.run_id }}"

    - name: Echo Github.run_number
      id: runNumber
      run: |
        echo "${{ github.run_number }}"

    - name: Echo Github.run_attempt
      id: runAttempt
      run: |
        echo "${{ github.run_Attempt }}"
    
    - name: Echo and Set Github Run Link
      id: IACACTIONSLINK
      run: |
        echo "${{ github.server_url }}/${{ github.repository }}/actions/workflows/prod-full-stack-cloudflare.yml"
        IACACTIONSLINK=${{ github.server_url }}/${{ github.repository }}/actions/workflows/prod-full-stack-cloudflare.yml
        echo "iacactionslink=${IACACTIONSLINK}" >> $GITHUB_OUTPUT
 
    - name: Bicep - Backend
      uses: Azure/arm-deploy@v2
      with:
        scope: subscription
        subscriptionId: ${{ steps.subs.outputs.subid }}
        region: ${{env.stackLocation}}
        template: ./.iac/backend.bicep
        deploymentName: backend-cloudflare-${{ github.run_id }}-${{ github.run_number }}-${{ github.run_attempt }}
        parameters: 
                  tagGitActionIacRunId=${{ github.run_id }}
                  tagGitActionIacRunNumber=${{ github.run_number }}
                  tagGitActionIacRunAttempt=${{ github.run_attempt }}
                  tagGitActionIacActionsLink=${{ steps.iacactionslink.outputs.iacactionslink}}
                  tagEnvironmentNameTier=${{env.stackEnvironment}}
                  tagCostCenter=${{env.tagCostCenter}}
                  resourceGroupLocation=${{env.stackLocation}}
                  rgBackendName=${{env.stackLocationCode}}-${{env.AppName}}-be-${{env.stackEnvironment}}-${{env.stackVersion}}-rg
                  cosmosName=${{env.stackLocationCode}}-${{env.AppName}}-${{env.stackEnvironment}}-${{env.stackVersion}}-cmsdb
                  databaseName=azure-resume-click-count
                  containerName=Counter
                  defaultConsistencyLevel=Eventual
                  functionAppStorageAccountName=${{env.stackLocationCode}}${{env.AppBackendName}}${{env.stackEnvironment}}${{env.stackVersion}}sa
                  functionAppAppInsightsName=${{env.stackLocationCode}}-${{env.AppBackendName}}-${{env.stackEnvironment}}-${{env.stackVersion}}-ai
                  functionAppAppServicePlanName=${{env.stackLocationCode}}-${{env.AppBackendName}}-${{env.stackEnvironment}}-${{env.stackVersion}}-asp
                  functionAppName=${{env.stackLocationCode}}-${{env.AppBackendName}}-${{env.stackEnvironment}}-${{env.stackVersion}}-fa
                  functionAppKeySecretNamePrimary=AzureResumeConnectionStringPrimary
                  functionAppKeySecretNameSecondary=AzureResumeConnectionStringSecondary
                  corsFriendlyDnsUri=https://${{env.customDomainPrefix}}.${{env.dnsZone}}
                  functionRuntime=dotnet-isolated
                  keyVaultName=${{env.stackLocationCode}}-${{env.AppName}}-${{env.stackEnvironment}}-${{env.stackVersion}}-kv
                  keyVaultSku=standard
  
  #                functionName=GetResumeCounter
  
    - name: Seed Cosmos DB
      id: cosmosDbSeed
      env:
        COSMOS_ACCOUNT_NAME: ${{env.stackLocationCode}}-${{env.AppName}}-${{env.stackEnvironment}}-${{env.stackVersion}}-cmsdb
        COSMOS_RESOURCE_GROUP: ${{env.stackLocationCode}}-${{env.AppName}}-be-${{env.stackEnvironment}}-${{env.stackVersion}}-rg
      run: bash scripts/seed-cosmos-db.sh

    - name: Echo Cosmos DB Counter Value
      if: steps.cosmosDbSeed.outputs.counter_value != ''
      run: echo "Cosmos DB visitor counter value is ${{ steps.cosmosDbSeed.outputs.counter_value }}"

    - name: Bicep - Frontend
      uses: Azure/arm-deploy@v2
      with:
        scope: subscription
        subscriptionId: ${{ steps.subs.outputs.subid }}
        region: ${{env.stackLocation}}
        template: ./.iac/frontend.bicep
        deploymentName: frontend-cloudflare-${{ github.run_id }}-${{ github.run_number }}-${{ github.run_attempt }}
        parameters: 
                  tagGitActionIacRunId=${{ github.run_id }}
                  tagGitActionIacRunNumber=${{ github.run_number }}
                  tagGitActionIacRunAttempt=${{ github.run_attempt }}
                  tagGitActionIacActionsLink=${{ steps.iacactionslink.outputs.iacactionslink}}
                  tagEnvironmentNameTier=${{env.stackEnvironment}}
                  tagCostCenter=${{env.tagCostCenter}}
                  resourceGroupLocation=${{env.stackLocation}}
                  rgFrontendName=${{env.stackLocationCode}}-${{env.AppName}}-fe-${{env.stackEnvironment}}-${{env.stackVersion}}-rg
                  staticSiteStorageAccountName=${{env.stackLocationCode}}${{env.AppName}}${{env.stackEnvironment}}${{env.stackVersion}}sa
                  staticSiteStorageAccountAppInsightsName=${{env.stackLocationCode}}-${{env.AppName}}-${{env.stackEnvironment}}-${{env.stackVersion}}-ai
    
    ### static site #1 - Begin
    - name: Enable Storage Account Frontend Static Website
      uses: azure/CLI@v2
      with:
        inlineScript: |
            az storage blob service-properties update --account-name ${{env.stackLocationCode}}${{env.AppName}}${{env.stackEnvironment}}${{env.stackVersion}}sa --auth-mode login --static-website --404-document error.html --index-document index.html
                
    - name: Get Static Site Endpoint
      id: staticSiteEndPoint
      run: |
        ssEndPoint=$(az storage account show --name ${{env.stackLocationCode}}${{env.AppName}}${{env.stackEnvironment}}${{env.stackVersion}}sa --resource-group ${{env.stackLocationCode}}-${{env.AppName}}-fe-${{env.stackEnvironment}}-${{env.stackVersion}}-rg --query "primaryEndpoints.web" --output tsv)
        echo "ssEndPoint=${ssEndPoint}" >> $GITHUB_OUTPUT
  
    - name: Echo Static Site Endpoint
      run: echo "${{ steps.staticSiteEndPoint.outputs.ssEndPoint }}"
   
    - name: Convert Enpoint URL to Domain
      id: convert_url_domain
      run: |
          export ssEndpoint_url=$(echo ${{ steps.staticSiteEndPoint.outputs.ssEndPoint }} |  awk -F[/:] '{print $4}')
          echo "ssEndpoint_domain=$ssEndpoint_url" >> $GITHUB_OUTPUT

    - name: Echo Static Site Endpoint Domain
      run: echo "${{ steps.convert_url_domain.outputs.ssEndpoint_domain }}"
   

    # DNS records: check-before-create pattern using Cloudflare API via shared script.
    # See scripts/cloudflare-dns-record.sh for implementation details.
    - name: Cloudflare - Frontend DNS
      continue-on-error: true
      env:
        CF_TOKEN: ${{ secrets.CLOUDFLARE_TOKEN }}
        CF_ZONE: ${{ secrets.CLOUDFLARE_ZONE }}
        RECORD_TYPE: CNAME
        RECORD_NAME: ${{env.customDomainPrefix}}.${{env.dnsZone}}
        RECORD_CONTENT: ${{ steps.convert_url_domain.outputs.ssEndpoint_domain }}
        RECORD_PROXIED: "true"
      run: bash scripts/cloudflare-dns-record.sh

    - name: Cloudflare - Frontend DNS Verify
      continue-on-error: true
      env:
        CF_TOKEN: ${{ secrets.CLOUDFLARE_TOKEN }}
        CF_ZONE: ${{ secrets.CLOUDFLARE_ZONE }}
        RECORD_TYPE: CNAME
        RECORD_NAME: asverify.${{env.customDomainPrefix}}.${{env.dnsZone}}
        RECORD_CONTENT: asverify.${{ steps.convert_url_domain.outputs.ssEndpoint_domain }}
        RECORD_PROXIED: "false"
      run: bash scripts/cloudflare-dns-record.sh
    ### static site #1 - End


    - name: Wait for DNS Propagation
      run: |
        DOMAIN="${{env.customDomainPrefix}}.${{env.dnsZone}}"
        ASVERIFY_DOMAIN="asverify.${DOMAIN}"
        MAX_ATTEMPTS=30
        SLEEP_SECONDS=10

        echo "Waiting for main DNS to resolve: ${DOMAIN}"
        MAIN_RESOLVED=false
        for i in $(seq 1 ${MAX_ATTEMPTS}); do
          if dig +short "${DOMAIN}" | grep -q '.'; then
            echo "✅ Main DNS resolved after $((i * SLEEP_SECONDS))s"
            MAIN_RESOLVED=true
            break
          fi
          echo "  Attempt ${i}/${MAX_ATTEMPTS} — not yet resolved, waiting ${SLEEP_SECONDS}s..."
          sleep ${SLEEP_SECONDS}
        done
        if [ "$MAIN_RESOLVED" != "true" ]; then
          echo "::warning::Main DNS ${DOMAIN} did not resolve within $((MAX_ATTEMPTS * SLEEP_SECONDS))s — continuing to custom domain step with retry"
        fi

        echo "Waiting for asverify DNS to resolve: ${ASVERIFY_DOMAIN}"
        ASVERIFY_RESOLVED=false
        for i in $(seq 1 ${MAX_ATTEMPTS}); do
          if dig +short "${ASVERIFY_DOMAIN}" | grep -q '.'; then
            echo "✅ asverify DNS resolved after $((i * SLEEP_SECONDS))s"
            ASVERIFY_RESOLVED=true
            break
          fi
          echo "  Attempt ${i}/${MAX_ATTEMPTS} — not yet resolved, waiting ${SLEEP_SECONDS}s..."
          sleep ${SLEEP_SECONDS}
        done
        if [ "$ASVERIFY_RESOLVED" != "true" ]; then
          echo "::warning::asverify DNS ${ASVERIFY_DOMAIN} did not resolve within $((MAX_ATTEMPTS * SLEEP_SECONDS))s — continuing to custom domain step with retry"
        fi

    ### static site #1 - custom domain
    # Retry loop: Azure validates domain ownership via the asverify CNAME.
    # On first deploy, DNS propagation may lag behind record creation, causing
    # a transient "az cli script failed" error. Retrying with backoff resolves this.
    - name: Enable Storage Account Frontend Cloudflare Custom Domain 
      uses: azure/CLI@v2
      with:
        inlineScript: |
            MAX_RETRIES=5
            RETRY_DELAY=30
            for attempt in $(seq 1 $MAX_RETRIES); do
              echo "Attempt ${attempt}/${MAX_RETRIES}: Setting custom domain..."
              if az storage account update \
                --name ${{env.stackLocationCode}}${{env.AppName}}${{env.stackEnvironment}}${{env.stackVersion}}sa \
                --resource-group ${{env.stackLocationCode}}-${{env.AppName}}-fe-${{env.stackEnvironment}}-${{env.stackVersion}}-rg \
                --custom-domain ${{env.customDomainPrefix}}.${{env.dnsZone}} \
                --use-subdomain true; then
                echo "✅ Custom domain set successfully on attempt ${attempt}"
                exit 0
              fi
              if [ "$attempt" -lt "$MAX_RETRIES" ]; then
                WAIT=$((RETRY_DELAY * attempt))
                echo "⏳ Failed on attempt ${attempt}, retrying in ${WAIT}s..."
                sleep $WAIT
              fi
            done
            echo "::error::Custom domain assignment failed after ${MAX_RETRIES} attempts"
            exit 1


  buildDeployProductionBackend:
    needs: [changes, deployProductionIac]
    if: ${{ always() && (needs.deployProductionIac.result == 'success' || needs.deployProductionIac.result == 'skipped') && (needs.changes.outputs.backendApp == 'true' || github.event_name == 'workflow_dispatch') }}
    name: Build and Deploy Backend App to Production - net8_isolated
    env: 
      AZURE_FUNCTIONAPP_PACKAGE_PATH: 'backend'    # set this to the path to your web app project, defaults to the repository root
      DOTNET_VERSION: '8.0.x'              # set this to the dotnet version to use
    environment:
      name: production
    runs-on: windows-latest
    steps:
    - name: 'Checkout GitHub Action'
      uses: actions/checkout@v5

    - name: 'Login via Azure CLI'
      uses: Azure/login@v2
      with:
          creds: ${{ secrets.AZURE_RESUME_GITHUB_SP }}  

    - name: Setup DotNet ${{ env.DOTNET_VERSION }} Environment
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: 'Resolve Project Dependencies Using Dotnet'
      shell: pwsh
      run: |
        pushd './${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/api'
        dotnet build --configuration Release --output ./output
        popd
    - name: 'Run unit test'
      shell: pwsh
      run: |
        pushd './${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/tests'
        dotnet test
    - name: 'Run Azure Functions Action'
      uses: Azure/functions-action@v1.5.4
      id: fa
      with:
        app-name: ${{env.stackLocationCode}}-${{env.AppBackendName}}-${{env.stackEnvironment}}-${{env.stackVersion}}-fa
        package: '${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/api/output'


  buildDeployProductionFrontend:
    needs: [changes, buildDeployProductionBackend]
    if: ${{ always() && (needs.buildDeployProductionBackend.result == 'success' || needs.buildDeployProductionBackend.result == 'skipped') && (needs.changes.outputs.frontendSite == 'true' || github.event_name == 'workflow_dispatch') }}
    name: Deploy Frontend Static App to Production
    environment:
      name: production
    runs-on: ubuntu-latest
    steps:
    - name: 'Checkout GitHub Action'
      uses: actions/checkout@v5

    - name: 'Login via Azure CLI'
      uses: Azure/login@v2
      with:
          creds: ${{ secrets.AZURE_RESUME_GITHUB_SP }} 
    
    - name: Generate Frontend Config
      run: |
        cat > frontend/config.js << CFGEOF
        var defined_FUNCTION_API_BASE = 'https://${{env.stackLocationCode}}-${{env.AppBackendName}}-${{env.stackEnvironment}}-${{env.stackVersion}}-fa.azurewebsites.net/api/GetResumeCounter';
        CFGEOF
        echo "Generated config.js:"
        cat frontend/config.js

    - name: Upload to blob storage
      uses: azure/CLI@v2
      with:
        inlineScript: |
            az storage blob upload-batch --account-name ${{env.stackLocationCode}}${{env.AppName}}${{env.stackEnvironment}}${{env.stackVersion}}sa --auth-mode key -d '$web' -s frontend/ --overwrite

    # Cache purge is best-effort — should not block a successful deployment.
    - name: Purge Cloudflare Cache
      continue-on-error: true
      run: |
        HTTP_CODE=$(curl -sS -o /tmp/cf_response.json -w '%{http_code}' -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE }}/purge_cache" \
          -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_TOKEN }}" \
          -H "Content-Type: application/json" \
          --data '{"purge_everything":true}')
        if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
          echo "::error::Cloudflare cache purge HTTP error $HTTP_CODE: $(cat /tmp/cf_response.json)"
          exit 1
        fi
        SUCCESS=$(jq -r '.success' /tmp/cf_response.json)
        if [ "$SUCCESS" != "true" ]; then
          echo "::error::Cloudflare cache purge API failure: $(cat /tmp/cf_response.json)"
          exit 1
        fi
        echo "Cloudflare cache purge succeeded"
