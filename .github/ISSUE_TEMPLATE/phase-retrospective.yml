name: Phase Retrospective
description: "AgentGitOps phase wrap-up retrospective — planned vs actual, KPIs, gap analysis. Created by PM."
title: "[Phase {phase}] Retrospective"
labels: ["phase-retrospective", "backlog", "type: phase-retrospective"]
body:
  - type: markdown
    attributes:
      value: |
        ## Phase Retrospective
        This issue tracks the wrap-up retrospective for a project phase.
        When all phase tasks are complete, a PM runs the standard Copilot prompt below
        in a clean Codespace on `develop` to auto-generate retrospective artifacts.

        > **Role:** Project Manager
        > **When:** Phase boundary — after all phase issues are closed or deferred
        > **Story Point Reference:** 1 SP = 2.5 hours | 3 SP/dev/day capacity | 5 days/week

  - type: dropdown
    id: phase
    attributes:
      label: Phase
      description: "Which phase is this retrospective for?"
      options:
        - "Phase 0 - Assessment"
        - "Phase 1 - Fix Function App"
        - "Phase 2 - Content Update"
        - "Phase 3 - Dev Deployment"
        - "Phase 4 - Prod Deployment"
        - "Phase 5 - Cleanup & Docs"
    validations:
      required: true

  - type: input
    id: milestone
    attributes:
      label: Milestone
      description: "GitHub Milestone name for this phase (e.g., Phase 0 - Assessment)"
      placeholder: "Phase 0 - Assessment"
    validations:
      required: true

  - type: input
    id: planned_issue_count
    attributes:
      label: Planned Issue Count
      description: "Number of issues assigned to this phase milestone at the start"
      placeholder: "13"
    validations:
      required: true

  - type: textarea
    id: phase_summary
    attributes:
      label: Phase Summary
      description: "High-level summary of what was planned and accomplished"
      placeholder: |
        **Planned:** ...
        **Accomplished:** ...
        **Deferred:** ...
    validations:
      required: true

  - type: textarea
    id: planned_vs_actual
    attributes:
      label: Planned vs Actual Effort
      description: "Auto-generated by scripts/generate-phase-retrospective.sh — paste output here"
      placeholder: |
        | Metric | Planned | Actual |
        |---|---|---|
        | Issues | — | — |
        | PRs merged | — | — |
        | Commits | — | — |

  - type: textarea
    id: capacity_metrics
    attributes:
      label: Capacity & Duration Metrics
      description: "Auto-generated — time duration, branches, users"
      placeholder: |
        | Metric | Value |
        |---|---|
        | Duration (days) | — |
        | Branches | — |
        | Unique contributors | — |

  - type: textarea
    id: story_point_metrics
    attributes:
      label: Story Point Velocity
      description: "Planned vs delivered story points — drives velocity KPI"
      placeholder: |
        | Metric | Planned | Actual |
        |---|---|---|
        | Total story points | — | — |
        | SP delivered | — | — |
        | Velocity (SP/day) | — | — |
        | AI-delivered SP | — | — |
        | Human-delivered SP | — | — |
        | AI velocity ratio | — | — |

  - type: textarea
    id: human_copilot_kpi
    attributes:
      label: Human vs Copilot KPI
      description: "AI-Human Productivity Index — auto-generated from commit trailers and issue labels"
      placeholder: |
        | Contributor | Commits | PRs | Issues Closed | Type |
        |---|---|---|---|---|
        | @user | — | — | — | Human |
        | copilot | — | — | — | AI |

  - type: textarea
    id: gap_analysis
    attributes:
      label: Gap Analysis Summary
      description: "Findings from assessment-output/ if applicable (Phase 0 and gap analysis phases)"
      placeholder: |
        - New findings: —
        - Issues created from gaps: —
        - Link to gaps-and-recommendations.md: —

  - type: textarea
    id: committed_artifacts
    attributes:
      label: Committed Artifacts
      description: "Links to committed retrospective files"
      placeholder: |
        - `docs/retrospectives/phase-N-retrospective.md`

  - type: textarea
    id: next_phase_readiness
    attributes:
      label: Next Phase Readiness Checklist
      description: "Checklist confirming readiness to begin the next phase"
      placeholder: |
        - [ ] All phase issues closed or deferred with rationale
        - [ ] Milestone closed
        - [ ] Retrospective committed to docs/retrospectives/
        - [ ] Project board updated
        - [ ] No blocking issues for next phase

  - type: textarea
    id: copilot_prompt
    attributes:
      label: Standard Copilot Prompt
      description: "The prompt the PM pastes into Copilot Chat in a Codespace to generate this retrospective"
      value: |
        ```
        Run the phase retrospective for Phase {N}:

        1. Run `bash scripts/generate-phase-retrospective.sh {N}`
        2. Review the generated `docs/retrospectives/phase-{N}-retrospective.md`
        3. Stage and commit: `git add docs/retrospectives/ && git commit -m "docs: Phase {N} retrospective"`
        4. Post the full retrospective as a comment on this issue using:
           `gh issue comment {ISSUE_NUMBER} --body-file docs/retrospectives/phase-{N}-retrospective.md`
        5. Close the milestone: `gh api -X PATCH repos/{owner}/{repo}/milestones/{milestone_number} -f state=closed`
        6. Update project board: move this issue to Done
        7. Push to develop: `git push origin develop`
        ```
